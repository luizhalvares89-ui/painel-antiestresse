<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Antiestresse</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar">
    <h1>🚀 Painel Antiestresse</h1>

    <div class="status">
        Cliques:
        <span id="clicks">0</span>
    </div>
</div>

<section class="panel">

    <h2>🔘 Botões</h2>
    <div id="buttons" class="grid"></div>

    <h2>💡 LEDs</h2>
    <div id="leds" class="grid"></div>

    <h2>🎛️ Knobs</h2>
    <div id="knobs" class="grid"></div>

    <h2>🎚️ Sliders</h2>
    <div id="sliders" class="grid"></div>

    <h2> Interruptores</h2>
    <div id="switches" class="grid"></div>

    <h2>🫧 Pop-It</h2>
    <div id="popit" class="popit"></div>

</section>

<script src="script.js"></script>

</body>
</html>
